<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Predictive Maintenance System</title>
    <!-- Use Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="app-layout">
        <aside class="sidebar">
            <div class="logo">
                <h2>IoT Monitor Pro</h2>
            </div>
            <nav>
                <ul>
                    <li class="active"><a href="#">Dashboard</a></li>
                    <li><a href="#">Devices</a></li>
                    <li><a href="#">Maintenance Logs</a></li>
                    <li><a href="#">Settings</a></li>
                </ul>
            </nav>
        </aside>

        <main class="content">
            <header>
                <h1>Dashboard</h1>
                <div class="status-indicator">
                    <span class="dot"></span>
                    <span id="apiStatus">Connecting...</span>
                </div>
            </header>

            <div class="dashboard-grid">
                <!-- Data Visualization Cards -->
                <div class="card chart-card">
                    <h3>Real-time Temperature Feed (°C)</h3>
                    <canvas id="tempChart"></canvas>
                </div>

                <div class="card chart-card">
                    <h3>Equipment Vibration Analysis (g-force)</h3>
                    <canvas id="vibChart"></canvas>
                </div>

                <!-- Anomaly Alerts Card -->
                <div class="card anomalies-card span-2">
                    <h3>Recent Anomalies Detected</h3>
                    <div class="table-container">
                        <table>
                            <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>Device</th>
                                    <th>Issue</th>
                                    <th>Time</th>
                                    <th>Status</th>
                                </tr>
                            </thead>
                            <tbody id="anomaliesBody">
                                <!-- Populated dynamically -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>
    
    <script src="app.js"></script>
</body>
</html>
